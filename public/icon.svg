<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Deep Slate rounded background -->
  <rect width="512" height="512" rx="120" fill="#0f172a" />
  
  <!-- Subtle inner glowing ring -->
  <rect x="16" y="16" width="480" height="480" rx="104" fill="none" stroke="#f59e0b" stroke-width="6" stroke-dasharray="16 12" opacity="0.4" />
  
  <g transform="translate(256, 270) scale(1.6)">
    <!-- Central Wheat stalk stem -->
    <path d="M 0,80 Q -5,30 0,-90" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" />
    
    <!-- Left Grains (Wheat Seeds) -->
    <path d="M 0,50 C -25,45 -35,20 -5,25 Z" fill="#f59e0b" />
    <path d="M 0,20 C -25,15 -35,-10 -5,-5 Z" fill="#f59e0b" />
    <path d="M 0,-10 C -25,-15 -35,-40 -5,-35 Z" fill="#f59e0b" />
    <path d="M 0,-40 C -25,-45 -35,-70 -5,-65 Z" fill="#f59e0b" />
    
    <!-- Right Grains -->
    <path d="M 0,50 C 25,45 35,20 5,25 Z" fill="#f59e0b" />
    <path d="M 0,20 C 25,15 35,-10 5,-5 Z" fill="#f59e0b" />
    <path d="M 0,-10 C 25,-15 35,-40 5,-35 Z" fill="#f59e0b" />
    <path d="M 0,-40 C 25,-45 35,-70 5,-65 Z" fill="#f59e0b" />
    
    <!-- Top Terminal Grain -->
    <path d="M 0,-70 C -12,-85 0,-110 0,-110 C 0,-110 12,-85 0,-70 Z" fill="#f59e0b" />
    
    <!-- Beard threads (fine fibers emerging from grains) -->
    <path d="M -22,23 Q -45,15 -55,0" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    <path d="M -22,-7 Q -45,-15 -55,-30" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    <path d="M -22,-37 Q -45,-45 -55,-60" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    
    <path d="M 22,23 Q 45,15 55,0" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    <path d="M 22,-7 Q 45,-15 55,-30" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8" />
    <path d="M 22,-37 Q 45,-45 55,-60" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  </g>
</svg>
